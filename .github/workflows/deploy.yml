name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular App
        # Dynamically set base-href to "/" for user pages (e.g. username.github.io) and "/repo/" for project pages
        run: |
          if [[ "${{ github.event.repository.name }}" == *".github.io" ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${{ github.event.repository.name }}/"
          fi
          echo "Using base-href: $BASE_HREF"
          npx ng build --configuration production --base-href "$BASE_HREF"

      - name: Create 404.html for routing fallback
        # Standard SPA workaround so refreshing a route (e.g. /about) doesn't return 404.
        run: cp dist/nairha/browser/index.html dist/nairha/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/nairha/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
